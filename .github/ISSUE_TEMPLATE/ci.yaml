name: CI / Configurazione
description: Modifica workflow GitHub Actions, configurazioni di sistema o release-please
title: 'chore: [descrizione breve]'
labels: ['chore']
assignees: 'Smailen5'
body:
  - type: markdown
    attributes:
      value: |
        Descrivi la modifica alla configurazione CI/CD o di sistema del repository.

  - type: textarea
    id: description
    attributes:
      label: Descrizione e Motivazione
      description: "Cosa vuoi modificare e perche'?"
      placeholder: "Aggiungere un workflow CI che validi il formato del file wishlist a ogni PR."
    validations:
      required: true

  - type: textarea
    id: task
    attributes:
      label: Task
      description: "Passaggi tecnici per completare la modifica."
      placeholder: |
        - [ ] Creare file .github/workflows/check-wishlist.yml
        - [ ] Configurare validazione formato righe DIM
        - [ ] Testare il workflow su un branch di prova
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Note aggiuntive (opzionale)
      placeholder: "Link a documentazione, esempi, dipendenze necessarie."
